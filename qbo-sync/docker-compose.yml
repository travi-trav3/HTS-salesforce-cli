# Local development Postgres only. The app itself runs via `npm run dev:*`.
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hts_qbo_sync
    ports:
      - '5432:5432'
    volumes:
      - qbo_sync_pgdata:/var/lib/postgresql/data

volumes:
  qbo_sync_pgdata:
